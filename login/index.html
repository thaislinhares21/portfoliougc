<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Acesso restrito | meu.painel</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <div class="tela-login">
    <div class="cartao cartao-login">
      <div class="logo">meu<span class="ponto">.</span>painel</div>

      <!-- Faixa de erro, escondida por padrão -->
      <div id="faixa-erro" class="faixa faixa-erro oculto"></div>
      <div id="faixa-sucesso" class="faixa faixa-sucesso oculto"></div>

      <!-- Formulário de login -->
      <form id="form-login">
        <h1>Acesso restrito</h1>
        <p class="subtitulo">Faça login para ver os números do seu portfólio.</p>

        <div class="campo">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" required autocomplete="username" />
        </div>

        <div class="campo">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" required autocomplete="current-password" />
        </div>

        <a href="#" id="link-esqueci" class="link-esqueci">Esqueci minha senha</a>

        <button type="submit" id="botao-entrar" class="botao botao-primario botao-largo">Entrar</button>
      </form>

      <!-- Formulário de recuperação de senha, escondido por padrão -->
      <form id="form-recuperar" class="oculto">
        <h1>Recuperar senha</h1>
        <p class="subtitulo">Digite seu e-mail para receber o link de redefinição.</p>

        <div class="campo">
          <label for="email-recuperar">E-mail</label>
          <input type="email" id="email-recuperar" name="email-recuperar" required autocomplete="username" />
        </div>

        <button type="submit" id="botao-recuperar" class="botao botao-primario botao-largo">Enviar link</button>
        <a href="#" id="link-voltar" class="link-voltar">Voltar para o login</a>
      </form>
    </div>
  </div>

  <!-- Supabase via CDN, depois a lógica de autenticação compartilhada -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/auth.js"></script>

  <script>
    const formLogin = document.getElementById("form-login");
    const formRecuperar = document.getElementById("form-recuperar");
    const linkEsqueci = document.getElementById("link-esqueci");
    const linkVoltar = document.getElementById("link-voltar");
    const faixaErro = document.getElementById("faixa-erro");
    const faixaSucesso = document.getElementById("faixa-sucesso");
    const botaoEntrar = document.getElementById("botao-entrar");
    const botaoRecuperar = document.getElementById("botao-recuperar");

    function esconderFaixas() {
      faixaErro.classList.add("oculto");
      faixaSucesso.classList.add("oculto");
    }

    function mostrarErro(mensagem) {
      faixaSucesso.classList.add("oculto");
      faixaErro.textContent = mensagem;
      faixaErro.classList.remove("oculto");
    }

    function mostrarSucesso(mensagem) {
      faixaErro.classList.add("oculto");
      faixaSucesso.textContent = mensagem;
      faixaSucesso.classList.remove("oculto");
    }

    // Alterna entre formulário de login e de recuperação de senha
    linkEsqueci.addEventListener("click", (e) => {
      e.preventDefault();
      esconderFaixas();
      formLogin.classList.add("oculto");
      formRecuperar.classList.remove("oculto");
    });

    linkVoltar.addEventListener("click", (e) => {
      e.preventDefault();
      esconderFaixas();
      formRecuperar.classList.add("oculto");
      formLogin.classList.remove("oculto");
    });

    // Envio do login
    formLogin.addEventListener("submit", async (e) => {
      e.preventDefault();
      esconderFaixas();

      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value;

      botaoEntrar.disabled = true;
      botaoEntrar.textContent = "Entrando...";

      try {
        await Auth.login(email, senha);
        window.location.href = "/painel.html";
      } catch (erro) {
        mostrarErro(erro.message || "Não foi possível entrar. Tente novamente.");
        botaoEntrar.disabled = false;
        botaoEntrar.textContent = "Entrar";
      }
    });

    // Envio da recuperação de senha
    formRecuperar.addEventListener("submit", async (e) => {
      e.preventDefault();
      esconderFaixas();

      const email = document.getElementById("email-recuperar").value.trim();

      botaoRecuperar.disabled = true;
      botaoRecuperar.textContent = "Enviando...";

      try {
        await Auth.recuperarSenha(email);
        mostrarSucesso("Enviamos um link de recuperação para o seu e-mail.");
      } catch (erro) {
        mostrarErro(erro.message || "Não foi possível enviar o e-mail. Tente novamente.");
      } finally {
        botaoRecuperar.disabled = false;
        botaoRecuperar.textContent = "Enviar link";
      }
    });

    // Se já houver sessão ativa ao abrir a página, redireciona direto para o painel
    (async function () {
      const usuario = await sb.auth.getSession();
      if (usuario.data.session) {
        window.location.href = "/painel.html";
      }
    })();
  </script>
</body>
</html>
